name: kigali_city_navigator
description: Flutter mobile app for locating Kigali city services with Firebase backend
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Firebase
  firebase_core: ^2.24.2
  firebase_auth: ^4.16.0
  cloud_firestore: ^4.14.0
  flutter_facebook_auth: ^6.0.4
  
  # Maps
  google_maps_flutter: ^2.5.0
  url_launcher: ^6.2.2
  
  # State management
  provider: ^6.1.1
  
  # UI
  google_fonts: ^6.1.0
  font_awesome_flutter: ^10.6.0
  
  # Utils
  intl: ^0.18.1
  google_sign_in: ^7.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true